  <div class="progress-bar-wrap"><div id="progress-bar"></div></div>

<footer>
  <strong>BakusGéo</strong> — Cours PostgreSQL / PostGIS · Module 3
</footer>

<script>
const QUESTIONS = [
  {
    q: "Quelle est la différence fondamentale entre DDL et DML en SQL ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "DDL s'exécute plus rapidement que DML car il ne touche pas aux données",
      "DML modifie la structure des tables ; DDL manipule les données",
      "DDL (Data Definition Language) définit la structure — CREATE, ALTER, DROP ; DML (Data Manipulation Language) manipule les données — INSERT, UPDATE, DELETE",
      "Il n'y a aucune différence : DDL et DML sont synonymes dans PostgreSQL"
    ],
    correct: 2,
    feedback: {
      ok: "Parfait ! DDL = structure (CREATE TABLE, ALTER TABLE, DROP TABLE) — ces commandes sont auto-validées (pas besoin de COMMIT). DML = données (INSERT, UPDATE, DELETE, SELECT) — ces commandes sont transactionnelles et nécessitent un COMMIT explicite (ou implicite en mode autocommit).",
      ko: "La bonne réponse est C. DDL (Data Definition Language) agit sur la structure des objets de la base. DML (Data Manipulation Language) agit sur les données. Il existe aussi DQL (SELECT) et DCL (GRANT, REVOKE). Ce classement est fondamental en SQL."
    }
  },
  {
    q: "Quelle contrainte SQL garantit qu'une colonne ne peut pas contenir deux fois la même valeur, mais autorise la valeur NULL ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "PRIMARY KEY — unicité + NOT NULL obligatoires",
      "NOT NULL — interdit les valeurs nulles uniquement",
      "CHECK — valide une condition logique",
      "UNIQUE — unicité garantie, NULL autorisé"
    ],
    correct: 3,
    feedback: {
      ok: "Exact ! UNIQUE garantit l'unicité des valeurs non nulles. Plusieurs lignes peuvent avoir NULL car NULL ≠ NULL en SQL. PRIMARY KEY = UNIQUE + NOT NULL. Exemple dans GéoVille : le code_postal d'une zone est unique mais pourrait être inconnu (NULL) pour une zone en construction.",
      ko: "La bonne réponse est D. UNIQUE = unicité des valeurs non nulles (plusieurs NULL sont tolérés). PRIMARY KEY = UNIQUE + NOT NULL (aucun NULL autorisé). Ce sont deux contraintes distinctes avec des comportements différents."
    }
  },
  {
    q: "Dans GéoVille, vous souhaitez insérer 3 zones administratives en une seule requête INSERT. Quelle syntaxe est correcte ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "INSERT INTO zones_admin VALUES (…), VALUES (…), VALUES (…);",
      "INSERT MULTIPLE INTO zones_admin (nom_zone, type_zone) VALUES (…)(…)(…);",
      "INSERT INTO zones_admin (nom_zone, type_zone) VALUES ('Centre', 'commercial'), ('Nord', 'résidentiel'), ('Sud', 'industriel');",
      "ADD INTO zones_admin (nom_zone, type_zone) VALUES ('Centre'), ('Nord'), ('Sud');"
    ],
    correct: 2,
    feedback: {
      ok: "Correct ! L'INSERT multi-valeurs est la syntaxe SQL standard : INSERT INTO table (col1, col2) VALUES (v1, v2), (v3, v4), (v5, v6); C'est bien plus performant que 3 INSERT séparés car PostgreSQL ne fait qu'un seul parsing et une seule écriture en transaction.",
      ko: "La bonne réponse est C. La syntaxe correcte est VALUES (…), (…), (…) avec les valeurs séparées par des virgules — pas le mot VALUES répété. INSERT MULTIPLE et ADD INTO n'existent pas en SQL standard."
    }
  },
  {
    q: "Vous souhaitez modifier le type de zone de 'résidentiel' à 'mixte' uniquement pour la zone dont l'id_zone vaut 3. Quelle requête est correcte ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "MODIFY zones_admin SET type_zone = 'mixte' WHERE id_zone = 3;",
      "UPDATE zones_admin SET type_zone = 'mixte' WHERE id_zone = 3;",
      "UPDATE zones_admin WHERE id_zone = 3 SET type_zone = 'mixte';",
      "CHANGE zones_admin SET type_zone = 'mixte' FOR id_zone = 3;"
    ],
    correct: 1,
    feedback: {
      ok: "Parfait ! La syntaxe UPDATE est : UPDATE table SET col = valeur WHERE condition; L'ordre des clauses est fixe : SET avant WHERE. Sans la clause WHERE, TOUTES les lignes seraient modifiées — c'est le piège classique de l'UPDATE sans filtre !",
      ko: "La bonne réponse est B. La syntaxe PostgreSQL est UPDATE … SET … WHERE … dans cet ordre impératif. MODIFY et CHANGE n'existent pas en SQL standard. L'option C inverse SET et WHERE — PostgreSQL retournerait une erreur de syntaxe."
    }
  },
  {
    q: "Quelle est la différence principale entre DELETE FROM zones_admin et TRUNCATE TABLE zones_admin ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "Il n'y a aucune différence, les deux suppriment toutes les lignes de la même façon",
      "TRUNCATE supprime uniquement la première ligne ; DELETE supprime toutes les lignes",
      "DELETE est réservé aux tables temporaires ; TRUNCATE aux tables permanentes",
      "DELETE est transactionnel et filtrable avec WHERE ; TRUNCATE est plus rapide, non filtrable, et réinitialise les séquences"
    ],
    correct: 3,
    feedback: {
      ok: "Exact ! DELETE supprime ligne par ligne (lent sur de grandes tables), peut être filtré (WHERE), est transactionnel (ROLLBACK possible). TRUNCATE vide la table en une seule opération (très rapide), ne peut pas être filtré, et réinitialise les compteurs SERIAL/IDENTITY. En production, préférez DELETE avec WHERE pour cibler précisément, et TRUNCATE pour vider complètement une table de données de test.",
      ko: "La bonne réponse est D. DELETE = suppression ciblée, transactionnelle, ligne par ligne. TRUNCATE = vidage complet, ultra-rapide, remet les séquences à zéro. TRUNCATE peut aussi être dans une transaction, mais il ne peut pas être filtré avec WHERE."
    }
  },
  {
    q: "Dans quel ordre PostgreSQL évalue-t-il réellement les clauses d'une requête SELECT ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "SELECT → FROM → WHERE → GROUP BY → HAVING → ORDER BY",
      "FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY",
      "FROM → SELECT → WHERE → ORDER BY → GROUP BY → HAVING",
      "WHERE → FROM → SELECT → GROUP BY → ORDER BY → HAVING"
    ],
    correct: 1,
    feedback: {
      ok: "Parfait ! L'ordre logique d'évaluation est : FROM (source) → WHERE (filtre lignes brutes) → GROUP BY (agrégation) → HAVING (filtre groupes) → SELECT (projection) → ORDER BY (tri final). C'est pourquoi vous ne pouvez pas utiliser un alias SELECT dans une clause WHERE — l'alias n'existe pas encore à l'étape WHERE !",
      ko: "La bonne réponse est B. L'ordre d'écriture (SELECT … FROM … WHERE) ≠ l'ordre d'évaluation (FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY). Ce point explique pourquoi un alias défini dans SELECT n'est pas accessible dans WHERE mais l'est dans ORDER BY."
    }
  },
  {
    q: "Dans GéoVille, vous voulez afficher uniquement les types de zone ayant PLUS DE 2 bâtiments. Quelle clause utilisez-vous pour filtrer APRÈS l'agrégation ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "WHERE COUNT(id_batiment) > 2",
      "FILTER COUNT(id_batiment) > 2",
      "HAVING COUNT(id_batiment) > 2",
      "WHEN COUNT(id_batiment) > 2"
    ],
    correct: 2,
    feedback: {
      ok: "Exact ! HAVING filtre les groupes APRÈS l'agrégation GROUP BY. WHERE filtre les lignes AVANT l'agrégation. Requête complète : SELECT type_zone, COUNT(id_batiment) FROM batiments JOIN zones_admin USING (id_zone) GROUP BY type_zone HAVING COUNT(id_batiment) > 2;",
      ko: "La bonne réponse est C. HAVING est la clause de filtrage POST-agrégation. WHERE filtre avant GROUP BY (donc on ne peut pas y utiliser COUNT). Mnémotechnique : HAVING = filtre sur les agrégats, WHERE = filtre sur les lignes brutes."
    }
  },
  {
    q: "Quelle est la différence entre INNER JOIN et LEFT JOIN lors de la jointure de zones_admin et batiments ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "INNER JOIN est plus rapide que LEFT JOIN sur les grandes tables",
      "LEFT JOIN retourne uniquement les lignes de la table batiments (droite)",
      "INNER JOIN retourne uniquement les zones ayant des bâtiments ; LEFT JOIN retourne TOUTES les zones, même celles sans bâtiment (NULL pour les colonnes de batiments)",
      "Il n'y a aucune différence : les deux retournent les mêmes lignes"
    ],
    correct: 2,
    feedback: {
      ok: "Parfait ! INNER JOIN = intersection : seules les zones ayant au moins un bâtiment apparaissent. LEFT JOIN = toutes les zones apparaissent ; les colonnes de batiments valent NULL pour les zones sans bâtiment. En urbanisme, un LEFT JOIN permet de lister les zones non construites — information précieuse pour la planification !",
      ko: "La bonne réponse est C. INNER JOIN ≠ LEFT JOIN en termes de lignes retournées. INNER JOIN : uniquement les lignes avec correspondance dans les deux tables. LEFT JOIN : toutes les lignes de la table gauche, même sans correspondance (NULL à droite). RIGHT JOIN et FULL OUTER JOIN sont les autres variantes."
    }
  },
  {
    q: "Dans une transaction PostgreSQL, que se passe-t-il si vous exécutez ROLLBACK après plusieurs UPDATE ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "Toutes les modifications sont validées et sauvegardées définitivement",
      "La connexion au serveur PostgreSQL est fermée",
      "Uniquement le dernier UPDATE est annulé",
      "Toutes les modifications effectuées depuis le BEGIN sont annulées — la base revient à son état initial"
    ],
    correct: 3,
    feedback: {
      ok: "Exact ! C'est la propriété A (Atomicité) d'ACID : tout ou rien. Un ROLLBACK annule TOUTES les opérations depuis le BEGIN, comme si elles n'avaient jamais eu lieu. Dans GéoVille : BEGIN; UPDATE zones_admin SET ... ; UPDATE batiments SET ... ; ROLLBACK; → les deux updates sont annulés.",
      ko: "La bonne réponse est D. ROLLBACK annule TOUT depuis le BEGIN — c'est le principe d'atomicité (A dans ACID). La connexion reste ouverte. SAVEPOINT permet de créer des points de sauvegarde intermédiaires pour n'annuler qu'une partie de la transaction."
    }
  },
  {
    q: "Quelle est la syntaxe correcte pour compter le nombre de bâtiments par type de zone dans GéoVille ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "SELECT type_zone, SUM(*) FROM batiments b JOIN zones_admin z ON b.id_zone = z.id_zone GROUP BY type_zone;",
      "SELECT type_zone, TOTAL(id_batiment) FROM batiments GROUP BY type_zone;",
      "SELECT type_zone, COUNT(id_batiment) FROM batiments b JOIN zones_admin z ON b.id_zone = z.id_zone GROUP BY type_zone ORDER BY COUNT(id_batiment) DESC;",
      "SELECT type_zone, NUMBER(id_batiment) FROM batiments GROUP BY type_zone;"
    ],
    correct: 2,
    feedback: {
      ok: "Parfait ! COUNT(colonne) compte les valeurs non nulles d'une colonne. COUNT(*) compte toutes les lignes (y compris celles avec NULL). La jointure est nécessaire car type_zone est dans zones_admin et id_batiment dans batiments. ORDER BY … DESC trie du plus grand au plus petit — idéal pour un rapport d'urbanisme.",
      ko: "La bonne réponse est C. La fonction d'agrégation pour compter est COUNT(), pas SUM(*), TOTAL() ou NUMBER(). SUM() additionne des valeurs numériques. COUNT(colonne) ignore les NULL, COUNT(*) les compte. La jointure ON b.id_zone = z.id_zone est obligatoire pour accéder à type_zone."
    }
  }
];

let current = 0, score = 0;
let answers = new Array(QUESTIONS.length).fill(null);
let submitted = new Array(QUESTIONS.length).fill(false);
const quizArea = document.getElementById('quiz-area');
const resultsEl = document.getElementById('results');

function renderAll() {
  quizArea.innerHTML = '';
  QUESTIONS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'card' + (qi === 0 ? ' active' : '');
    card.id = `card-${qi}`;
    card.innerHTML = `
      <div class="q-num">Question ${qi+1} sur ${QUESTIONS.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
      <ul class="options" id="opts-${qi}">
        ${q.options.map((opt, oi) => `
          <li>
            <input type="radio" name="q${qi}" id="q${qi}o${oi}" value="${oi}">
            <label for="q${qi}o${oi}"><span class="dot"></span>${opt}</label>
          </li>`).join('')}
      </ul>
      <div class="feedback" id="fb-${qi}"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="submit-${qi}" onclick="submitAnswer(${qi})" disabled>Valider ma réponse</button>
        <button class="btn btn-next" id="next-${qi}" onclick="nextQuestion(${qi})" style="display:none">
          ${qi < QUESTIONS.length-1 ? 'Question suivante →' : 'Voir mes résultats →'}
        </button>
      </div>`;
    quizArea.appendChild(card);
    q.options.forEach((_, oi) => {
      document.getElementById(`q${qi}o${oi}`).addEventListener('change', () => {
        document.getElementById(`submit-${qi}`).disabled = false;
        answers[qi] = oi;
      });
    });
  });
  updateProgress();
}

function submitAnswer(qi) {
  if (submitted[qi]) return;
  submitted[qi] = true;
  const chosen = answers[qi], correct = QUESTIONS[qi].correct;
  const isCorrect = chosen === correct;
  if (isCorrect) score++;
  QUESTIONS[qi].options.forEach((_, oi) => {
    const lbl = document.querySelector(`#q${qi}o${oi} + label`);
    if (oi === correct) lbl.classList.add('correct');
    else if (oi === chosen && !isCorrect) lbl.classList.add('wrong');
    document.getElementById(`q${qi}o${oi}`).disabled = true;
  });
  const fb = document.getElementById(`fb-${qi}`);
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  fb.innerHTML = isCorrect
    ? `<strong>✅ Bonne réponse !</strong>${QUESTIONS[qi].feedback.ok}`
    : `<strong>❌ Pas tout à fait…</strong>${QUESTIONS[qi].feedback.ko}
       <div style="margin-top:14px;padding-top:12px;border-top:1px solid #f5c6cb;">
         <span style="font-size:.9rem;display:block;margin-bottom:8px;">Voulez-vous réessayer ?</span>
         <button class="btn btn-reset" onclick="retryQuestion(${qi})" style="font-size:.9rem;padding:8px 18px;">🔄 Réessayer</button>
       </div>`;
  fb.style.display = 'block';
  document.getElementById(`submit-${qi}`).style.display = 'none';
  document.getElementById(`next-${qi}`).style.display = 'inline-block';
}

function nextQuestion(qi) {
  document.getElementById(`card-${qi}`).classList.remove('active');
  if (qi + 1 < QUESTIONS.length) {
    current = qi + 1;
    document.getElementById(`card-${current}`).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else { showResults(); }
  updateProgress();
}

function updateProgress() {
  document.getElementById('progress-bar').style.width = (current / QUESTIONS.length * 100) + '%';
}

function showResults() {
  quizArea.style.display = 'none';
  resultsEl.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
  const pct = Math.round(score / QUESTIONS.length * 100);
  let grade, circleClass, emoji, msg;
  if (pct >= 90)      { grade='A'; circleClass='score-A'; emoji='🏆'; msg='Excellent ! Vous maîtrisez le SQL fondamental. Vous êtes prêt(e) pour le Module 4 — Types de données et contraintes avancées !'; }
  else if (pct >= 70) { grade='B'; circleClass='score-B'; emoji='👍'; msg='Bon résultat ! Relisez les sections sur les transactions et l\'ordre d\'évaluation SQL avant de continuer.'; }
  else if (pct >= 50) { grade='C'; circleClass='score-C'; emoji='📚'; msg='Résultat moyen. Reprenez les sections DDL et DML du Module 3 et refaites le TP GéoVille.'; }
  else                 { grade='D'; circleClass='score-D'; emoji='🔁'; msg='Ce module nécessite une révision complète. Reprenez depuis les fondamentaux SQL : CREATE TABLE, INSERT, SELECT, WHERE.'; }
  const breakdown = QUESTIONS.map((q, qi) => {
    const ok = answers[qi] === q.correct;
    return `<div class="breakdown-item">
      <span class="icon">${ok ? '✅' : '❌'}</span>
      <div>
        <div>Question ${qi+1} : ${q.q.substring(0,70)}…</div>
        <div class="q-label">${ok ? 'Bonne réponse' : `Vous : "${q.options[answers[qi]]?.substring(0,50) ?? '—'}…"`}</div>
      </div>
    </div>`;
  }).join('');
  resultsEl.innerHTML = `
    <div class="score-circle ${circleClass}">
      <span>${score}/${QUESTIONS.length}</span>
      <span class="score-label">${pct}%</span>
    </div>
    <h2>${emoji} ${grade==='A'?'Félicitations !':grade==='B'?'Bon travail !':grade==='C'?'Peut mieux faire':'À réviser'}</h2>
    <p class="msg">${msg}</p>
    <div class="btn-row" style="justify-content:center;margin-bottom:32px;">
      <button class="btn btn-reset" onclick="resetQuiz()">🔁 Recommencer</button>
      <a href="index.html" class="btn btn-next" style="text-decoration:none;display:inline-block">← Module 1</a>
    </div>
    <div class="breakdown"><h3>Récapitulatif</h3>${breakdown}</div>`;
}

function retryQuestion(qi) {
  answers[qi] = null; submitted[qi] = false;
  QUESTIONS[qi].options.forEach((_, oi) => {
    const radio = document.getElementById(`q${qi}o${oi}`);
    radio.disabled = false; radio.checked = false;
    document.querySelector(`#q${qi}o${oi} + label`).classList.remove('correct','wrong');
  });
  document.getElementById(`fb-${qi}`).style.display = 'none';
  document.getElementById(`submit-${qi}`).style.display = 'inline-block';
  document.getElementById(`submit-${qi}`).disabled = true;
  document.getElementById(`next-${qi}`).style.display = 'none';
}

function resetQuiz() {
  current = 0; score = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  submitted = new Array(QUESTIONS.length).fill(false);
  resultsEl.style.display = 'none'; quizArea.style.display = 'block';
  renderAll(); window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderAll();
</script>
