<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Module 1 — Introduction à PostgreSQL | BakusGéo</title>
<style>
  :root {
    --blue1: #1F4E79;
    --blue2: #2E75B6;
    --blue3: #EBF3FA;
    --green: #28A745;
    --red:   #DC3545;
    --gold:  #FFC107;
    --gray:  #6C757D;
    --light: #F8F9FA;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Times New Roman', Times, serif;
    background: linear-gradient(135deg, #EBF3FA 0%, #ffffff 100%);
    min-height: 100vh;
    color: #222;
  }
  header {
    background: var(--blue1);
    color: white;
    padding: 28px 20px 20px;
    text-align: center;
  }
  header .badge {
    display: inline-block;
    background: var(--blue2);
    font-family: Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  header h1 { font-size: 1.8rem; margin-bottom: 6px; }
  header p  { font-size: 1rem; opacity: .85; font-style: italic; }

  .progress-bar-wrap {
    background: rgba(255,255,255,.2);
    border-radius: 20px;
    height: 8px;
    margin: 18px auto 0;
    max-width: 400px;
    overflow: hidden;
  }
  #progress-bar {
    background: var(--gold);
    height: 100%;
    width: 0%;
    transition: width .4s ease;
    border-radius: 20px;
  }

  main {
    max-width: 780px;
    margin: 40px auto 60px;
    padding: 0 16px;
  }

  /* ── Question card ── */
  .card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(31,78,121,.12);
    padding: 36px 40px;
    margin-bottom: 28px;
    display: none;
    animation: fadeIn .35s ease;
  }
  .card.active { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

  .q-num {
    font-family: Arial, sans-serif;
    font-size: 12px;
    color: var(--blue2);
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .q-text {
    font-size: 1.15rem;
    line-height: 1.6;
    color: var(--blue1);
    font-weight: bold;
    margin-bottom: 24px;
  }
  .q-hint {
    font-size: .9rem;
    font-style: italic;
    color: var(--gray);
    margin-top: -16px;
    margin-bottom: 20px;
  }

  .options { list-style: none; }
  .options li {
    margin-bottom: 12px;
  }
  .options label {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 2px solid #dee2e6;
    border-radius: 8px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    font-size: 1rem;
    line-height: 1.5;
  }
  .options label:hover { border-color: var(--blue2); background: var(--blue3); }
  .options input[type="radio"] { display: none; }
  .options input[type="radio"] + label .dot {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border: 2px solid #adb5bd;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px;
    transition: border-color .2s, background .2s;
  }
  .options input[type="radio"]:checked + label .dot {
    border-color: var(--blue2); background: var(--blue2);
  }
  .options input[type="radio"]:checked + label .dot::after {
    content: '';
    width: 8px; height: 8px;
    background: white;
    border-radius: 50%;
  }
  .options input[type="radio"]:checked + label { border-color: var(--blue2); background: var(--blue3); }

  /* After submission: correct / wrong */
  .options label.correct  { border-color: var(--green)!important; background: #e8f8e8!important; }
  .options label.wrong    { border-color: var(--red)!important;   background: #ffe8e8!important; }
  .options label.correct .dot { border-color: var(--green)!important; background: var(--green)!important; }
  .options label.wrong   .dot { border-color: var(--red)!important;   background: var(--red)!important; }

  .feedback {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: 8px;
    font-size: .95rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.correct { background: #d4edda; border-left: 5px solid var(--green); color: #155724; }
  .feedback.wrong   { background: #f8d7da; border-left: 5px solid var(--red);   color: #721c24; }
  .feedback strong { display: block; margin-bottom: 4px; }

  /* ── Buttons ── */
  .btn-row { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }
  .btn {
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-family: Arial, sans-serif;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .btn-primary { background: var(--blue1); color: white; }
  .btn-next    { background: var(--blue2); color: white; }
  .btn-reset   { background: white; border: 2px solid var(--blue2); color: var(--blue2); }
  .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ── Results screen ── */
  #results {
    display: none;
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(31,78,121,.12);
    padding: 48px 40px;
    text-align: center;
    animation: fadeIn .4s ease;
  }
  .score-circle {
    width: 130px; height: 130px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 28px;
    font-size: 2.2rem;
    font-weight: bold;
    font-family: Arial, sans-serif;
    border: 6px solid;
  }
  .score-circle .score-label { font-size: .75rem; font-weight: normal; letter-spacing: 1px; }
  .score-A { border-color: var(--green); color: var(--green); background: #e8f8e8; }
  .score-B { border-color: var(--blue2); color: var(--blue2); background: var(--blue3); }
  .score-C { border-color: var(--gold);  color: #856404;      background: #fff3cd; }
  .score-D { border-color: var(--red);   color: var(--red);   background: #ffe8e8; }
  #results h2 { font-size: 1.7rem; color: var(--blue1); margin-bottom: 10px; }
  #results .msg { font-size: 1.05rem; color: #444; margin-bottom: 32px; max-width: 500px; margin-left: auto; margin-right: auto; }
  .breakdown {
    text-align: left;
    border-top: 1px solid #dee2e6;
    padding-top: 24px;
    margin-top: 8px;
  }
  .breakdown h3 { color: var(--blue1); margin-bottom: 16px; font-size: 1.1rem; }
  .breakdown-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: .92rem;
  }
  .breakdown-item .icon { font-size: 1.2rem; flex-shrink: 0; }
  .breakdown-item .q-label { color: var(--gray); font-size: .82rem; }

  footer {
    text-align: center;
    padding: 24px;
    font-family: Arial, sans-serif;
    font-size: .85rem;
    color: var(--gray);
  }
  footer strong { color: var(--blue1); }
</style>
</head>
<body>

<header>
  <div class="badge">Module 1 — Niveau Débutant</div>
  <h1>Quiz — Introduction à PostgreSQL</h1>
  <p>Cours PostgreSQL/PostGIS · BakusGéo</p>
  <div class="progress-bar-wrap"><div id="progress-bar"></div></div>
</header>

<main id="quiz-area">
  <!-- Les cartes de questions sont injectées par JavaScript -->
</main>

<div id="results" style="max-width:780px;margin:40px auto 60px;padding:0 16px;">
  <!-- Résultats injectés par JS -->
</div>

<footer>
  <strong>BakusGéo</strong> — Cours PostgreSQL / PostGIS · Module 1
</footer>

<script>
const QUESTIONS = [
  {
    q: "Qu'est-ce qu'une base de données relationnelle ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "Un tableur Excel avec plusieurs feuilles liées entre elles",
      "Un ensemble de tables structurées reliées par des clés, géré par un SGBDR",
      "Un fichier texte contenant des données séparées par des virgules",
      "Un langage de programmation permettant d'interroger des données"
    ],
    correct: 1,
    feedback: {
      ok: "Exact ! Une base relationnelle organise les données en tables (relations) interconnectées via des clés étrangères. Le SGBDR (comme PostgreSQL) garantit l'intégrité et l'accès concurrent à ces données.",
      ko: "La bonne réponse est B. Une base relationnelle est composée de tables liées par des clés, gérées par un Système de Gestion de Bases de Données Relationnelles (SGBDR)."
    }
  },
  {
    q: "Dans la hiérarchie de PostgreSQL, quel est l'ordre correct du plus grand au plus petit ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "Table → Schéma → Base de données → Instance",
      "Instance → Base de données → Schéma → Table → Colonne → Ligne",
      "Base de données → Instance → Schéma → Table",
      "Schéma → Base de données → Instance → Colonne"
    ],
    correct: 1,
    feedback: {
      ok: "Parfait ! L'ordre correct est : Instance (le serveur PostgreSQL) → Base de données → Schéma → Table → Colonne → Ligne. C'est la hiérarchie fondamentale à mémoriser.",
      ko: "La bonne réponse est B. L'ordre est : Instance → Base de données → Schéma → Table → Colonne → Ligne. L'instance est le serveur PostgreSQL lui-même."
    }
  },
  {
    q: "Vous créez la base GéoVille et souhaitez y créer un schéma 'urban'. Quelle est la séquence correcte dans pgAdmin ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "Créer le schéma 'urban' dans n'importe quelle base, puis y créer les tables",
      "Se connecter à la base geoville dans l'Éditeur de Requêtes, puis exécuter CREATE SCHEMA urban",
      "Créer d'abord les tables, puis le schéma qui les contiendra",
      "Exécuter CREATE SCHEMA depuis la base postgres, puis déplacer les tables vers geoville"
    ],
    correct: 1,
    feedback: {
      ok: "Correct ! Il faut d'abord se connecter à la base geoville (via le sélecteur de connexion), puis exécuter CREATE SCHEMA urban. Un schéma appartient toujours à une base de données précise.",
      ko: "La bonne réponse est B. Le schéma doit être créé dans la base de destination. Dans pgAdmin, sélectionnez geoville comme base de connexion avant d'exécuter CREATE SCHEMA urban."
    }
  },
  {
    q: "Que signifie la contrainte PRIMARY KEY sur la colonne id_commune ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "La colonne peut contenir des valeurs NULL",
      "La colonne est chiffrée pour protéger les données",
      "Chaque valeur est unique et non nulle ; PostgreSQL crée automatiquement un index sur cette colonne",
      "La colonne est la première à être affichée dans les résultats SELECT"
    ],
    correct: 2,
    feedback: {
      ok: "Exact ! PRIMARY KEY impose deux contraintes simultanées : unicité (pas deux lignes avec le même id) et NOT NULL (une ligne doit toujours avoir un identifiant). PostgreSQL crée aussi un index B-Tree automatique pour accélérer les recherches.",
      ko: "La bonne réponse est C. PRIMARY KEY = unicité + NOT NULL + index automatique. C'est l'identifiant technique de chaque ligne de la table."
    }
  },
  {
    q: "Vous tentez d'insérer un bâtiment avec id_commune = 99, mais aucune commune n'a cet identifiant. Que se passe-t-il ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "L'insertion réussit et PostgreSQL crée automatiquement la commune manquante",
      "L'insertion réussit mais PostgreSQL enregistre un avertissement dans les logs",
      "PostgreSQL rejette l'insertion avec ERROR: violates foreign key constraint (état SQL 23503)",
      "L'insertion réussit uniquement si l'utilisateur est superuser"
    ],
    correct: 2,
    feedback: {
      ok: "Parfait ! C'est exactement ce que vous avez observé dans le TP. La contrainte REFERENCES (clé étrangère) interdit l'insertion d'une valeur qui n'existe pas dans la table parente. L'état SQL 23503 est le code standard ANSI pour 'foreign key violation'.",
      ko: "La bonne réponse est C. La clé étrangère (REFERENCES) est un garde-fou : PostgreSQL vérifie systématiquement que la valeur existe dans la table parente avant d'accepter l'insertion. C'est l'état SQL 23503."
    }
  },
  {
    q: "Quelle commande SQL permet de créer la base de données GéoVille avec l'encodage UTF8 ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "INSERT DATABASE geoville ENCODING 'UTF8';",
      "NEW DATABASE geoville WITH ENCODING = 'UTF8';",
      "CREATE DATABASE geoville ENCODING 'UTF8' TEMPLATE template0;",
      "MAKE DATABASE geoville CHARSET UTF8;"
    ],
    correct: 2,
    feedback: {
      ok: "Correct ! La syntaxe exacte est CREATE DATABASE … ENCODING 'UTF8' TEMPLATE template0. L'option TEMPLATE template0 est recommandée pour éviter les conflits d'encodage avec la base template1.",
      ko: "La bonne réponse est C. En SQL, on utilise CREATE DATABASE. L'option TEMPLATE template0 est importante pour garantir la compatibilité de l'encodage UTF8."
    }
  },
  {
    q: "Dans le TP GéoVille, pourquoi la table urban.communes doit-elle être créée AVANT urban.batiments ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "Par convention alphabétique : 'c' vient avant 'b'",
      "Parce que pgAdmin l'exige dans cet ordre pour des raisons d'affichage",
      "Parce que batiments référence communes via une clé étrangère — la table parente doit exister avant la table fille",
      "Pour que l'index sur id_commune soit généré dans le bon ordre"
    ],
    correct: 2,
    feedback: {
      ok: "Exact ! C'est la règle fondamentale des clés étrangères : la table référencée (parente) doit exister avant la table qui la référence (fille). Si vous créez batiments avant communes, PostgreSQL retourne ERROR: relation 'urban.communes' does not exist.",
      ko: "La bonne réponse est C. L'ordre de création est dicté par les dépendances de clés étrangères : la table parente (communes) doit exister avant que la table fille (batiments) puisse y faire référence."
    }
  },
  {
    q: "Que signifie ACID dans le contexte des bases de données relationnelles ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "Automatique, Cohérent, Indexé, Décentralisé",
      "Atomicité, Cohérence, Isolation, Durabilité",
      "Archivage, Cryptage, Intégrité, Distribution",
      "Accès, Contrôle, Indexation, Déduplication"
    ],
    correct: 1,
    feedback: {
      ok: "Parfait ! ACID = Atomicité (tout ou rien), Cohérence (les contraintes restent valides), Isolation (les transactions ne s'interfèrent pas), Durabilité (les données validées survivent aux pannes). C'est le socle de la fiabilité de PostgreSQL.",
      ko: "La bonne réponse est B. ACID est l'acronyme de : Atomicité, Cohérence, Isolation, Durabilité. Ces quatre propriétés garantissent la fiabilité des transactions dans PostgreSQL."
    }
  },
  {
    q: "Dans pgAdmin, quel onglet devez-vous consulter après avoir exécuté une requête pour voir si elle a réussi ou échoué ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "L'onglet 'Données' qui affiche la grille de résultats",
      "L'onglet 'Notifications' qui liste toutes les alertes",
      "L'onglet 'Messages' qui affiche le statut d'exécution et les erreurs éventuelles",
      "L'onglet 'Historique' qui conserve les requêtes passées"
    ],
    correct: 2,
    feedback: {
      ok: "Exact ! L'onglet 'Messages' dans pgAdmin affiche le résultat de l'exécution : CREATE TABLE, INSERT 0 4, ou en cas d'erreur le message ERREUR avec l'état SQL et le détail. C'est le premier endroit à regarder après F5.",
      ko: "La bonne réponse est C. L'onglet 'Messages' affiche le statut d'exécution de la requête (succès ou erreur avec détails). L'onglet 'Données' n'apparaît que pour les requêtes SELECT qui retournent des lignes."
    }
  },
  {
    q: "Quelle est la différence entre VARCHAR(100) et CHAR(5) dans PostgreSQL ?",
    hint: "(Une seule bonne réponse)",
    options: [
      "VARCHAR stocke des nombres, CHAR stocke des lettres",
      "VARCHAR(100) est une chaîne de longueur variable (1 à 100 car.) ; CHAR(5) est une chaîne de longueur fixe (toujours 5 car., complétée par des espaces si nécessaire)",
      "VARCHAR est plus lent que CHAR car il nécessite une décompression",
      "Il n'y a aucune différence pratique, les deux sont interchangeables"
    ],
    correct: 1,
    feedback: {
      ok: "Parfait ! VARCHAR(100) stocke entre 1 et 100 caractères sans gaspillage. CHAR(5) occupe toujours exactement 5 caractères (complété d'espaces si la valeur est plus courte). Dans GéoVille, on utilise CHAR(5) pour le code_postal car un code postal français a toujours exactement 5 chiffres.",
      ko: "La bonne réponse est B. VARCHAR = longueur variable (plus flexible, recommandé pour les textes). CHAR = longueur fixe (utile pour les codes standardisés comme les codes postaux ou INSEE qui ont toujours la même longueur)."
    }
  }
];

let current = 0;
let score   = 0;
let answers = new Array(QUESTIONS.length).fill(null); // index de la réponse choisie
let submitted = new Array(QUESTIONS.length).fill(false);

const quizArea = document.getElementById('quiz-area');
const resultsEl = document.getElementById('results');

function renderAll() {
  quizArea.innerHTML = '';
  QUESTIONS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'card' + (qi === 0 ? ' active' : '');
    card.id = `card-${qi}`;
    card.innerHTML = `
      <div class="q-num">Question ${qi+1} sur ${QUESTIONS.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}
      <ul class="options" id="opts-${qi}">
        ${q.options.map((opt, oi) => `
          <li>
            <input type="radio" name="q${qi}" id="q${qi}o${oi}" value="${oi}">
            <label for="q${qi}o${oi}">
              <span class="dot"></span>
              ${opt}
            </label>
          </li>
        `).join('')}
      </ul>
      <div class="feedback" id="fb-${qi}"></div>
      <div class="btn-row">
        <button class="btn btn-primary" id="submit-${qi}" onclick="submitAnswer(${qi})" disabled>
          Valider ma réponse
        </button>
        <button class="btn btn-next" id="next-${qi}" onclick="nextQuestion(${qi})" style="display:none">
          ${qi < QUESTIONS.length - 1 ? 'Question suivante →' : 'Voir mes résultats →'}
        </button>
      </div>
    `;
    quizArea.appendChild(card);

    // Activer le bouton Valider quand une option est choisie
    q.options.forEach((_, oi) => {
      const radio = document.getElementById(`q${qi}o${oi}`);
      radio.addEventListener('change', () => {
        document.getElementById(`submit-${qi}`).disabled = false;
        answers[qi] = oi;
      });
    });
  });
  updateProgress();
}

function submitAnswer(qi) {
  if (submitted[qi]) return;
  submitted[qi] = true;
  const chosen = answers[qi];
  const correct = QUESTIONS[qi].correct;
  const isCorrect = chosen === correct;
  if (isCorrect) score++;

  // Coloriser les options
  QUESTIONS[qi].options.forEach((_, oi) => {
    const lbl = document.querySelector(`#q${qi}o${oi} + label`);
    if (oi === correct) lbl.classList.add('correct');
    else if (oi === chosen && !isCorrect) lbl.classList.add('wrong');
  });

  // Désactiver les radios
  QUESTIONS[qi].options.forEach((_, oi) => {
    document.getElementById(`q${qi}o${oi}`).disabled = true;
  });

  // Feedback
  const fb = document.getElementById(`fb-${qi}`);
  fb.className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
  if (isCorrect) {
    fb.innerHTML = `<strong>✅ Bonne réponse !</strong>${QUESTIONS[qi].feedback.ok}`;
  } else {
    fb.innerHTML = `
      <strong>❌ Pas tout à fait…</strong>${QUESTIONS[qi].feedback.ko}
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid #f5c6cb;">
        <span style="font-size:.9rem;display:block;margin-bottom:8px;">Voulez-vous réessayer cette question ?</span>
        <button class="btn btn-reset" onclick="retryQuestion(${qi})" style="font-size:.9rem;padding:8px 18px;">
          🔄 Réessayer cette question
        </button>
      </div>`;
  }
  fb.style.display = 'block';

  document.getElementById(`submit-${qi}`).style.display = 'none';
  document.getElementById(`next-${qi}`).style.display = 'inline-block';
}

function nextQuestion(qi) {
  document.getElementById(`card-${qi}`).classList.remove('active');
  if (qi + 1 < QUESTIONS.length) {
    current = qi + 1;
    document.getElementById(`card-${current}`).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
  updateProgress();
}

function updateProgress() {
  const pct = (current / QUESTIONS.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function showResults() {
  quizArea.style.display = 'none';
  resultsEl.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const pct = Math.round((score / QUESTIONS.length) * 100);
  let grade, circleClass, emoji, msg;
  if (pct >= 90)      { grade='A'; circleClass='score-A'; emoji='🏆'; msg='Excellent ! Vous maîtrisez parfaitement les fondamentaux de PostgreSQL. Vous êtes prêt(e) pour le Module 2.'; }
  else if (pct >= 70) { grade='B'; circleClass='score-B'; emoji='👍'; msg='Bon résultat ! Quelques notions méritent une révision. Relisez les sections correspondantes avant de passer au Module 2.'; }
  else if (pct >= 50) { grade='C'; circleClass='score-C'; emoji='📚'; msg='Résultat moyen. Nous vous recommandons de relire les sections théoriques du Module 1 et de refaire le TP GéoVille.'; }
  else                 { grade='D'; circleClass='score-D'; emoji='🔁'; msg='Ce module nécessite une révision complète. Reprenez depuis le début, en portant une attention particulière aux sections sur le modèle relationnel et les contraintes.'; }

  // Breakdown
  const breakdown = QUESTIONS.map((q, qi) => {
    const ok = answers[qi] === q.correct;
    return `<div class="breakdown-item">
      <span class="icon">${ok ? '✅' : '❌'}</span>
      <div>
        <div>Question ${qi+1} : ${q.q.substring(0,70)}…</div>
        <div class="q-label">${ok ? 'Bonne réponse' : `Vous : "${q.options[answers[qi]]?.substring(0,50) ?? '—'}…"`}</div>
      </div>
    </div>`;
  }).join('');

  resultsEl.innerHTML = `
    <div class="score-circle ${circleClass}">
      <span>${score}/${QUESTIONS.length}</span>
      <span class="score-label">${pct}%</span>
    </div>
    <h2>${emoji} ${grade === 'A' ? 'Félicitations !' : grade === 'B' ? 'Bon travail !' : grade === 'C' ? 'Peut mieux faire' : 'À réviser'}</h2>
    <p class="msg">${msg}</p>
    <div class="btn-row" style="justify-content:center;margin-bottom:32px;">
      <button class="btn btn-reset" onclick="resetQuiz()">🔁 Recommencer le quiz</button>
    </div>
    <div class="breakdown">
      <h3>Récapitulatif de vos réponses</h3>
      ${breakdown}
    </div>
  `;
}

function retryQuestion(qi) {
  // Réinitialise uniquement la question en erreur
  answers[qi] = null;
  submitted[qi] = false;
  // Réaffiche les options et masque le feedback
  const opts = document.querySelectorAll(`#opts-${qi} .opt`);
  opts.forEach(o => { o.className = 'opt'; o.style.pointerEvents = ''; });
  document.getElementById(`fb-${qi}`).style.display = 'none';
  document.getElementById(`submit-${qi}`).style.display = 'inline-block';
  document.getElementById(`submit-${qi}`).disabled = true;
  document.getElementById(`next-${qi}`).style.display = 'none';
}

function resetQuiz() {
  current = 0; score = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  submitted = new Array(QUESTIONS.length).fill(false);
  resultsEl.style.display = 'none';
  quizArea.style.display = 'block';
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderAll();
</script>
</body>
</html>
